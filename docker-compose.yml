version: '3.8'

services:
  mongo:
    image: mongo:7.0
    container_name: slack_clone_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - slack_network

  redis:
    image: redis:7-alpine
    container_name: slack_clone_redis
    ports:
      - '6379:6379'
    networks:
      - slack_network

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: slack_clone_server
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/slack-clone
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your_production_jwt_secret_key_at_least_16_chars
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost
    depends_on:
      - mongo
      - redis
    networks:
      - slack_network

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: slack_clone_client
    ports:
      - '80:80'
    depends_on:
      - server
    networks:
      - slack_network

volumes:
  mongo_data:

networks:
  slack_network:
    driver: bridge
