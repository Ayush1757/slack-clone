services:
  - type: web
    name: slack-clone-backend
    env: node
    region: singapore
    buildCommand: npm install && npm run build --workspace server
    startCommand: npm run start --workspace server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CLIENT_URL
        sync: false

  - type: web
    name: slack-clone-frontend
    env: static
    region: singapore
    buildCommand: npm install && npm run build --workspace client
    staticPublishPath: client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
